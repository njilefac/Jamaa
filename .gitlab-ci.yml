image: mcr.microsoft.com/dotnet/sdk:5.0

stages:
    - build
    - test

build:
    stage: build
    script:
        - "dotnet build -c Release 'Club Station.sln'"
    artifacts:
      paths:
        - Club.Station.Desktop/bin/Release/net5.0

test:
    stage: test
    script: 
        - "dotnet test ./Tests/UnitTests.csproj"
