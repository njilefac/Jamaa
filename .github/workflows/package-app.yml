name: Package App

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - id: get_version
        run: |
          VERSION="${{ github.event.release.tag_name || '1.0.0' }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  package-macos:
    name: Package macOS
    needs: prepare
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build DMG
        shell: pwsh
        run: ./bundle/package-macos.ps1 -Version ${{ needs.prepare.outputs.version }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: bundle/Jamaa-Installer-${{ needs.prepare.outputs.version }}.dmg
          if-no-files-found: error

  package-windows:
    name: Package Windows
    needs: prepare
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        shell: pwsh
        run: ./bundle/package-windows.ps1 -Version ${{ needs.prepare.outputs.version }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: bundle/Jamaa-Installer-${{ needs.prepare.outputs.version }}.exe
          if-no-files-found: error

  package-linux:
    name: Package Linux
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build package
        run: chmod +x ./bundle/package-linux.sh && ./bundle/package-linux.sh ${{ needs.prepare.outputs.version }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-package
          path: bundle/jamaa_${{ needs.prepare.outputs.version }}_amd64.deb
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - package-macos
      - package-windows
      - package-linux
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-installer
          path: artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-package
          path: artifacts

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.deb
          tag_name: ${{ github.event.release.tag_name || format('v{0}', needs.prepare.outputs.version) }}
          make_latest: ${{ github.event_name == 'release' }}
          generate_release_notes: ${{ github.event_name == 'workflow_dispatch' }}
          append_body: true
          fail_on_unmatched_files: true
          body: |
            ### Downloads
            - [macOS (DMG)](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.release.tag_name || format('v{0}', needs.prepare.outputs.version) }}/Jamaa-Installer-${{ needs.prepare.outputs.version }}.dmg)
            - [Windows (EXE)](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.release.tag_name || format('v{0}', needs.prepare.outputs.version) }}/Jamaa-Installer-${{ needs.prepare.outputs.version }}.exe)
            - [Linux (DEB)](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.release.tag_name || format('v{0}', needs.prepare.outputs.version) }}/jamaa_${{ needs.prepare.outputs.version }}_amd64.deb)

  publish-pages:
    name: Publish GitHub Pages
    needs:
      - prepare
      - package-macos
      - package-windows
      - package-linux
      - publish-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # 💡 Note: Artifacts are placed into a single flat directory structure (site/downloads)
      # This allows NetSparkle's --binaries (-b) scan to cleanly process all extension types.
      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: site/downloads

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-installer
          path: site/downloads

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-package
          path: site/downloads

      - name: Create Pages index
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p site
          
          # Fetch last 5 releases
          RELEASES_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=5")
          
          # Start generating HTML
          cat > site/index.html <<'EOF_HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Jamaa - Releases</title>
            <style>
              body { font-family: system-ui, -apple-system, sans-serif; margin: 0; line-height: 1.6; color: #333; background-color: #f4f7f9; }
              .container { max-width: 900px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
              h1 { color: #2c3e50; margin-top: 0; }
              h2 { color: #34495e; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; margin-top: 2rem; }
              .description { font-size: 1.1rem; color: #555; }
              .release-card { border: 1px solid #e1e4e8; border-radius: 6px; padding: 1.5rem; margin-bottom: 2rem; background: #fff; }
              .release-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
              .version-tag { font-weight: bold; background: #ebf5fb; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 1.1rem; color: #2980b9; }
              .release-date { color: #6a737d; font-size: 0.9rem; margin-left: 0.5rem; }
              .latest-badge { background: #2cbe4e; color: white; font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 3px; font-weight: 600; margin-left: 0.5rem; }
              .release-notes-summary { margin: 1rem 0; font-size: 0.95rem; color: #444; border-left: 3px solid #eee; padding-left: 1rem; white-space: pre-wrap; }
              .full-notes-link { color: #0366d6; text-decoration: none; font-size: 0.9rem; }
              .full-notes-link:hover { text-decoration: underline; }
              .download-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 1rem; }
              .download-btn { display: flex; flex-direction: column; align-items: center; padding: 0.6rem; background-color: #f6f8fa; border: 1px solid #d1d5da; color: #24292e; text-decoration: none; border-radius: 6px; font-size: 0.85rem; }
              .download-btn:hover { background-color: #0366d6; color: white; }
              .download-btn b { margin-bottom: 2px; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Jamaa</h1>
              <p class="description">Jamaa is a cross-platform application designed to simplify the daily management of small associations and groups.</p>
              <h2>Releases</h2>
              <div class="releases-container">
          EOF_HTML

          # Process releases and inject into HTML
          # Use single quotes for the shell variable to avoid shell interpolation.
          # Platform metadata is passed as a JSON string to avoid quoting hell.
          PLATFORMS_JSON='[{"name":"macOS","ext":".dmg"},{"name":"Windows","ext":".exe"},{"name":"Linux","ext":".deb"}]'
          
          JQ_QUERY='
            .[0:5] | to_entries[] | . as $entry | .value as $rel |
            ($rel.published_at | split("T")[0]) as $date |
            ($rel.body | if . == null then "No release notes provided." else . end | sub("\r\n"; "\n"; "g") | split("\n") | .[0:3] | join("\n") | if length > 200 then .[0:200] + "..." else . end) as $summary |
            "<div class=\"release-card\">
              <div class=\"release-header\">
                <div>
                  <span class=\"version-tag\">" + $rel.tag_name + "</span>" +
                  (if $entry.key == 0 then "<span class=\"latest-badge\">Latest</span>" else "" end) +
                  "<span class=\"release-date\">" + $date + "</span>
                </div>
                <a href=\"" + $rel.html_url + "\" class=\"full-notes-link\" target=\"_blank\">Full Release Notes &rarr;</a>
              </div>
              <div class=\"release-notes-summary\">" + ($summary | @html) + "</div>
              <div class=\"download-grid\">" +
                ([$platforms[] | . as $p | 
                  ([$rel.assets[] | select(.name | endswith($p.ext))] | first) as $asset |
                  if $asset then
                    "<a href=\"" + $asset.browser_download_url + "\" class=\"download-btn\">
                      <b>" + $p.name + "</b>
                      <span>" + $p.ext + "</span>
                    </a>"
                  else "" end
                ] | join("")) +
              "</div>
            </div>"
          '
          jq -r --argjson platforms "$PLATFORMS_JSON" "$JQ_QUERY" <<< "$RELEASES_JSON" >> site/index.html

          # Close HTML
          cat >> site/index.html <<'EOF_FOOTER'
              </div>
            </div>
          </body>
          </html>
          EOF_FOOTER

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install NetSparkle AppCast Generator
        run: dotnet tool install --global NetSparkleUpdater.Tools.AppCastGenerator

      - name: Generate AppCast
        shell: bash
        env:
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"

          TARGET_BRANCH="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TARGET_BRANCH="${{ github.event.release.target_commitish }}"
          fi

          CHANNEL="beta"
          if [[ "$TARGET_BRANCH" == "main" || "$TARGET_BRANCH" == release/* || "$TARGET_BRANCH" == hotfix/* ]]; then
            CHANNEL="stable"
          fi

          CHANNEL_ARGS=(--channel "$CHANNEL")
          
          # Create release notes file for embedding
          mkdir -p release-notes
          if [ -n "$RELEASE_NOTES" ]; then
            printf "%s" "$RELEASE_NOTES" > "release-notes/${{ needs.prepare.outputs.version }}.md"
          else
            echo "No release notes provided for this version." > "release-notes/${{ needs.prepare.outputs.version }}.md"
          fi

          # Use --file-version and --file-extract-version to ensure the version matches the release tag.
          # We use --reparse-existing for subsequent OSs to merge them into the same cast file.
          netsparkle-generate-appcast -a site/ --output-file-name cast -n Jamaa -b site/downloads -u "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/downloads" -e exe -r -f true --file-version ${{ needs.prepare.outputs.version }} --os windows -p release-notes "${CHANNEL_ARGS[@]}"
          netsparkle-generate-appcast -a site/ --output-file-name cast -n Jamaa -b site/downloads -u "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/downloads" -e dmg -r --reparse-existing -f true --file-version ${{ needs.prepare.outputs.version }} --os macos -p release-notes "${CHANNEL_ARGS[@]}"
          netsparkle-generate-appcast -a site/ --output-file-name cast -n Jamaa -b site/downloads -u "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/downloads" -e deb -r --reparse-existing -f true --file-version ${{ needs.prepare.outputs.version }} --os linux -p release-notes "${CHANNEL_ARGS[@]}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5