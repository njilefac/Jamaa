name: Build and Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write # Required for commenting on PRs

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.100
    - name: Restore dependencies
      run: dotnet restore Libota.sln
    - name: Build
      run: dotnet build Libota.sln --no-restore
    - name: Test
      run: dotnet test Libota.sln --no-build --verbosity normal --logger "trx" --results-directory ./TestResults
    - name: Test Report
      uses: dorny/test-reporter@v2
      if: always()
      with:
        name: .NET Test Results
        path: "**/TestResults/*.trx"
        reporter: dotnet-trx
