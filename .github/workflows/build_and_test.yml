  name: Build and Test
  
  on:
    push:
    pull_request:
  
  jobs:
    build:
      
      permissions:
        checks: write
        pull-requests: write
        contents: read
      runs-on: ubuntu-latest
      
      steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore Libota.sln
      - name: Build
        run: dotnet build Libota.sln --no-restore
      - name: Test
        run: dotnet test Libota.sln --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: .NET Test Results
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx
