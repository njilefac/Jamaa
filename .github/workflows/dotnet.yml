name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Libota.sln
    - name: Build
      run: dotnet build Libota.sln --no-restore
    - name: Test
      run: dotnet test Libota.sln --no-build --verbosity normal
